<!DOCTYPE html>
<html>
<head>
<title>My Courses</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
 background:linear-gradient(135deg,#1e3c72,#2a5298);
 color:white;
 font-family:Segoe UI;
 padding:40px;
}
.card{
 background:rgba(255,255,255,0.15);
 padding:15px;
 border-radius:18px;
 margin-top:15px;
}
button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:18px;
 font-weight:bold;
}
.secondary{background:rgba(255,255,255,0.2);color:white;}
</style>
</head>
<body>
<div style="text-align:center; margin-bottom:20px;">
    <img src="Logo.png" style="width:100px; border-radius:50%; background:white; padding:6px;">
</div>
<h2>My Courses</h2>
<div id="list"></div>

<button class="secondary" onclick="window.location.href='dashboard.html'">Back</button>

<script>
let user=JSON.parse(localStorage.getItem("currentUser"));
if(!user){window.location.href="login.html";}

let list=document.getElementById("list");

if(user.courses.length===0){
 list.innerHTML="<p>No courses enrolled.</p>";
}else{
 user.courses.forEach(c=>{
   list.innerHTML+=`
   <div class="card">
   <b>${c.code} - ${c.name}</b>
   <p>${c.credits} Credits</p>
   </div>`;
 });
}
</script>

</body>
</html>
