<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
 background:linear-gradient(135deg,#1e3c72,#2a5298);
 color:white;
 font-family:Segoe UI;
 padding:40px;
}
button{
 width:100%;
 padding:15px;
 margin-top:10px;
 border:none;
 border-radius:18px;
 font-weight:bold;
}
.primary{background:white;color:#1e3c72;}
.secondary{background:rgba(255,255,255,0.2);color:white;}
.card{
 background:rgba(255,255,255,0.15);
 padding:15px;
 border-radius:18px;
 margin-top:15px;
}
</style>
</head>
<body>
<div style="text-align:center; margin-bottom:20px;">
    <img src="Logo.png" style="width:100px; border-radius:50%; background:white; padding:6px;">
</div>
<h2>Welcome, <span id="name"></span></h2>

<div class="card">
<p><b>Semester:</b> 2026 B</p>
<p><b>Credits:</b> <span id="credits"></span> / 21</p>
</div>

<button class="primary" onclick="window.location.href='search.html'">Search Courses</button>
<button class="secondary" onclick="window.location.href='mycourses.html'">My Courses</button>
<button class="secondary" onclick="logout()">Logout</button>

<script>
let user=JSON.parse(localStorage.getItem("currentUser"));

if(!user){
 window.location.href="login.html";
}

document.getElementById("name").innerText=user.name;
document.getElementById("credits").innerText=user.credits;

function logout(){
 localStorage.removeItem("currentUser");
 window.location.href="login.html";
}
</script>

</body>
</html>
